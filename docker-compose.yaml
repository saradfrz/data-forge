networks:
  ndsnet:
    driver: bridge

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d  # Mounting init scripts directory
    networks:
      - ndsnet
    restart: always

  airflow-init:
    image: apache/airflow:2.10.5
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=my_secure_secret
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: >
      bash -c "airflow db init &&
      airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin"
    networks:
      - ndsnet

  airflow-webserver:
    image: apache/airflow:2.10.5
    container_name: airflow-webserver
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      - AIRFLOW__WEBSERVER__SECRET_KEY=my_secure_secret
      - AIRFLOW__WEBSERVER__BASE_URL=http://airflow-webserver:8080
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    ports:
      - "8080:8080"
    command: webserver
    networks:
      - ndsnet
    restart: always

  airflow-scheduler:
    image: apache/airflow:2.10.5
    container_name: airflow-scheduler
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=my_secure_secret
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: scheduler
    networks:
      - ndsnet
    restart: always


  minio-webhook:
    build: 
      context: ./minio-webhook 
      dockerfile: Dockerfile
    container_name: minio-webhook
    restart: always
    ports:
      - "5000:5000"  
    networks:
      - ndsnet

  
  minio-setup:
    image: minio/mc
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
      minio-webhook:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set myminio http://minio:9000 minio minio123; do sleep 5; done;
        mc admin config set myminio notify_webhook:1 endpoint="http://minio-webhook:5000/webhook"
        mc admin service restart myminio
        mc event add myminio/etl-input arn:minio:sqs::webhook --event put;
    networks:
      - ndsnet

  
  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    restart: always
    volumes:
      - ./include/data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
      - MINIO_NOTIFY_WEBHOOK_ENABLE_webhook=on
      - MINIO_NOTIFY_WEBHOOK_ENDPOINT_webhook=http://minio-webhook:5000/webhook
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ndsnet

  aws-lambda:
    image: public.ecr.aws/lambda/python:3.9
    container_name: aws-lambda
    env_file: ./lambda_function/.env
    environment:
      - LAMBDA_TASK_ROOT=/var/task
      - ETL_SCRIPT_PATH=/opt/bitnami/spark/workspace/etl_job.py
      - SPARK_MASTER_URL=spark://spark-master:7077
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/airflow
      - TABLE_NAME=exchange_rates
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "9010:8080"
    volumes:
      - ./lambda_function:/var/task
    command: ["app.lambda_handler"]
    networks:
      - ndsnet

  aws-glue:
    image: public.ecr.aws/glue/aws-glue-libs:5
    container_name: aws-glue
    volumes:
      - ./workspace:/home/hadoop/workspace 
    command: [ "spark-submit", "--master", "local[*]", "/home/hadoop/workspace/src/etl_job.py" ]
    environment:
      - S3_ENDPOINT=http://minio:9000
    networks:
      - ndsnet

  spark-master:
    image: bitnami/spark:latest
    container_name: spark-master
    ports:
      - "8082:8080"
      - "7077:7077"
    volumes:
    - ./spark/src:/opt/bitnami/spark/workspace
    environment:
      - SPARK_MODE=master
      - SPARK_CLASSPATH=/opt/hive/lib/*
      - SPARK_SQL_CATALOG_IMPLEMENTATION=hive
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - AWS_REGION=us-east-1
      - S3_ENDPOINT=http://minio:9000
    networks:
      - ndsnet

  spark-worker:
    image: bitnami/spark:latest
    container_name: spark-worker
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - ./spark/src:/opt/bitnami/spark/workspace
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_CLASSPATH=/opt/hive/lib/*
      - SPARK_SQL_CATALOG_IMPLEMENTATION=hive
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - AWS_REGION=us-east-1
      - S3_ENDPOINT=http://minio:9000
    networks:
      - ndsnet

  docker-proxy:
    image: alpine/socat
    container_name: docker-proxy
    command: "TCP4-LISTEN:2375,fork,reuseaddr UNIX-CONNECT:/var/run/docker.sock"
    ports:
      - "2376:2375"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ndsnet


